<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videos com HTML5</title>
</head>
<body>
    <h1>Inserindo Vídeos hospedados localmente</h1>
    <p>Este video está hospedado no meu própio servidor.</p>
    <video width="560" poster="#" controls loop>
        <source src="midia/Meu-Video.webm" type="">
        <source src="midia/Meu-VideoComprimido.mp4" type="">
        <source src="midia/meu-video.ogv" type="">
        <p>Seu navegador não tem compatibilidade com reprodução de videos.</p>
    </video>
    <h1>Inserindo videos do Youtube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/i7L19SOqbNM?si=RTjm8vDK_Ufl7a6U" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <h4>Veja o Curso Completo</h4>
</body>
</html>
