<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'Be My';
            src: url('fonts/Be\ My\ Valentine.otf') format('opentype'), url('fonts/Be\ My\ Valentine.ttf My Valentine.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;

            /*Tipos  de format()
            - opentype (otf)
            - truetype (ttf)
            - embedded-opentype
            - truetype-aat (Apple advanced Typography)
            - svg
            */
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            font-family:'Be My', Times, serif;
            font-size: 3em;
        }
    </style>
</head>
<body>
    <h1>Titulo</h1>
    <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Laborum nobis placeat quaerat architecto eos repudiandae consequatur dicta vero harum! Vitae dolor quia suscipit impedit odit harum voluptates omnis facere reprehenderit!</p>
</body>
</html>
